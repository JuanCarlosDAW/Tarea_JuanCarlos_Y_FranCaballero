<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
  }

  header {
    background-color: #111;
    color: white;
    text-align: center;
    padding: 20px;
  }

  .contenedor {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: black;
  }

  textarea {
    resize: vertical;
  }

  button {
    background: black;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    margin-top: 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #333;
  }
</style>
</head>

<body>

<header>
  <h1>Contacto</h1>
</header>

<div class="contenedor">
  <form>
    <label>Nombre</label>
    <input type="text" placeholder="Tu nombre" required>

    <label>Email</label>
    <input type="email" placeholder="Tu email" required>

    <label>Mensaje</label>
    <textarea rows="5" placeholder="Escribe tu mensaje" required></textarea>

    <button type="submit">Enviar</button>
  </form>
</div>
<script src="Js/contacto.js"></script>

</body>
</html>
