<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Artículos de Gimnasio</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #f5f5f5;
    }
    header {
      background-color: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      width: 250px;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .precio {
      color: green;
      font-weight: bold;
    }
    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Artículos de Gimnasio</h1>
</header>

<section class="contenedor">

  <div class="card">
    <img src="img/toalla.jpg" alt="Toalla deportiva">
    <h3>Toalla deportiva</h3>
    <p>Absorbente y ligera</p>
    <p class="precio">10€</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="img/bottle.jpg" alt="Cantimplora">
    <h3>Cantimplora</h3>
    <p>Botella reutilizable 1L</p>
    <p class="precio">15€</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <img src="img/creatine.png" alt="Proteína">
    <h3>Proteína en polvo</h3>
    <p>Suplemento alimenticio</p>
    <p class="precio">30€</p>
    <button>Comprar</button>
  </div>

</section>

</body>
</html>
